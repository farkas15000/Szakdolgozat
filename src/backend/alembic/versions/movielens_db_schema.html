
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  users {
    uuid id PK
    string email
    string hashed_password
    string display_name
    int movielens_user_id FK
    timestamp created_at
    timestamp last_login_at
  }
  movies {
    int movie_id PK
    string title
    int release_year
    string imdb_id
    string tmdb_id
    timestamp imported_at
  }
  genres {
    int genre_id PK
    string name
  }
  movie_genres {
    int movie_id FK
    int genre_id FK
  }
  ratings {
    uuid id PK
    uuid user_id FK
    int movie_id FK
    float rating
    int movielens_user_id
    timestamp rated_at
    timestamp created_at
  }
  tags {
    uuid id PK
    uuid user_id FK
    int movie_id FK
    string tag
    int movielens_user_id
    timestamp tagged_at
    timestamp created_at
  }
  implicit_feedback {
    uuid id PK
    uuid user_id FK
    int movie_id FK
    string event_type
    int duration_seconds
    string session_id
    timestamp occurred_at
  }
  recommendations {
    uuid id PK
    uuid user_id FK
    int movie_id FK
    float score
    string algorithm
    string model_version
    timestamp generated_at
    timestamp expires_at
    bool was_shown
    bool was_clicked
  }

  users ||--o{ ratings : "writes"
  users ||--o{ tags : "creates"
  users ||--o{ implicit_feedback : "generates"
  users ||--o{ recommendations : "receives"
  movies ||--o{ ratings : "has"
  movies ||--o{ tags : "has"
  movies ||--o{ implicit_feedback : "tracks"
  movies ||--o{ recommendations : "appears in"
  movies ||--o{ movie_genres : "categorized by"
  genres ||--o{ movie_genres : "used in"
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
